scenarios:

  - id: scenario:gha-to-mcp
    description: "GitHub Actions workflow calling MCP server as machine identity"
    source_runtime: github_actions
    target_type: mcp_server
    identity_kind: machine
    steps:
      - step: 1
        mechanism: mech:github-actions-oidc
        action: "Request GHA OIDC token (permissions: id-token: write)"
        produces: oidc_jwt
      - step: 2
        mechanism: mech:oauth2.token-exchange
        action: "Exchange GHA OIDC at cloud STS"
        consumes: oidc_jwt
        produces: cloud_access_token
      - step: 3
        mechanism: mech:mcp-oauth21
        action: "Call MCP server with OAuth 2.1 Bearer token"
        consumes: cloud_access_token
        wire_format: "Authorization: Bearer <cloud_access_token>"
    references:
      - mech:github-actions-oidc
      - mech:oauth2.token-exchange
      - mech:mcp-oauth21

  - id: scenario:eks-parallel-creds
    description: "EKS pod calling Anthropic API and private MCP server simultaneously"
    source_runtime: eks_pod
    target_type: multiple
    identity_kind: machine
    steps:
      - step: 1a
        mechanism: mech:aws-irsa
        action: "Pod uses IRSA credentials for AWS services"
        produces: aws_credentials
      - step: 1b
        mechanism: mech:spiffe-x509-svid
        action: "Pod presents X.509-SVID for internal MCP server mTLS"
        produces: mtls_cert
      - step: 2a
        action: "Anthropic API call"
        wire_format: "x-api-key: <rotated_key_from_secrets_manager>"
      - step: 2b
        action: "Internal MCP server (mTLS, no Authorization header)"
    references:
      - mech:aws-irsa
      - mech:spiffe-x509-svid

  - id: scenario:k8s-to-gcp
    description: "Kubernetes pod (non-GKE) calling GCP service via WIF"
    source_runtime: eks_pod
    target_type: gcp_service
    identity_kind: machine
    steps:
      - step: 1
        mechanism: mech:k8s-projected-sa-token
        action: "Read projected SA token (audience: GCP WIF provider)"
        produces: k8s_oidc_jwt
      - step: 2
        mechanism: mech:gcp-workload-identity
        action: "Exchange K8s token at GCP STS"
        consumes: k8s_oidc_jwt
        produces: gcp_access_token
      - step: 3
        action: "Call GCP service"
        wire_format: "Authorization: Bearer <gcp_access_token>"
    references:
      - mech:k8s-projected-sa-token
      - mech:gcp-workload-identity

  - id: scenario:delegation-chain
    description: "User-delegated agent delegating to sub-agent via RFC 8693"
    source_runtime: any
    target_type: sub_agent
    identity_kind: user_delegated
    steps:
      - step: 1
        mechanism: mech:oauth2.auth-code-pkce
        action: "User authorizes Agent A"
        produces: user_delegated_token
      - step: 2
        mechanism: mech:oauth2.token-exchange
        action: "Agent A exchanges token for Agent B, narrowing scope"
        consumes: user_delegated_token
        produces: agent_b_token
      - step: 3
        action: "Agent B calls downstream API"
        wire_format: "Authorization: Bearer <agent_b_token>"
        note: "act claim: { sub: user, act: { sub: agent-b, act: { sub: agent-a } } }"
    references:
      - mech:oauth2.auth-code-pkce
      - mech:oauth2.token-exchange

  - id: scenario:cicd-no-secrets
    description: "CI/CD pipeline deploying to cloud without stored secrets"
    source_runtime: github_actions
    target_type: cloud_iam
    identity_kind: machine
    steps:
      - step: 1
        mechanism: mech:github-actions-oidc
        action: "Obtain GHA OIDC token"
        produces: oidc_jwt
      - step: 2
        mechanism: mech:gcp-workload-identity
        action: "Exchange at cloud WIF"
        consumes: oidc_jwt
        produces: cloud_token
      - step: 3
        action: "Deploy to cloud"
    references:
      - mech:github-actions-oidc
      - mech:gcp-workload-identity

  - id: scenario:device-grant
    description: "Headless agent requesting user consent via Device Authorization Grant"
    source_runtime: headless_agent
    target_type: user_authorized_api
    identity_kind: user_delegated
    steps:
      - step: 1
        mechanism: mech:oauth2.device-auth
        action: "Request device code"
        produces: device_code
      - step: 2
        action: "Display user_code to user via out-of-band channel"
      - step: 3
        action: "Poll token endpoint until user approves"
        produces: access_token
    references:
      - mech:oauth2.device-auth

  - id: scenario:ciba-reauth
    description: "Long-running async agent requesting mid-task re-authorization"
    source_runtime: autonomous_agent
    target_type: high_risk_api
    identity_kind: user_delegated
    steps:
      - step: 1
        mechanism: mech:ciba
        action: "Submit backchannel auth request with binding_message"
        produces: auth_req_id
      - step: 2
        action: "Agent pauses task; polls for user approval"
      - step: 3
        action: "User approves on trusted device"
        produces: new_access_token
      - step: 4
        action: "Agent resumes task with new token"
    references:
      - mech:ciba

  - id: scenario:fapi2-high-value
    description: "High-value financial transaction with FAPI 2.0 (DPoP + mTLS + PAR + RAR)"
    source_runtime: financial_agent
    target_type: financial_api
    identity_kind: user_delegated
    steps:
      - step: 1
        mechanism: mech:oauth2.par
        action: "Submit PAR with authorization_details"
        produces: request_uri
      - step: 2
        mechanism: mech:oauth2.auth-code-pkce
        action: "Complete auth code flow"
        produces: auth_code
      - step: 3
        mechanism: mech:dpop
        action: "Exchange code for DPoP-bound token"
        produces: dpop_token
      - step: 4
        mechanism: mech:mtls-certificate-bound
        action: "API call with DPoP + mTLS client certificate"
    references:
      - mech:fapi2
      - mech:dpop
      - mech:mtls-certificate-bound
      - mech:oauth2.par
      - mech:oauth2.rar

  - id: scenario:api-key-migration
    description: "Step-by-step migration from long-lived API keys to workload identity"
    steps:
      - step: 1
        action: "Audit: find all API keys in code and CI"
        tool: "git log -S 'API_KEY' --all"
      - step: 2
        action: "Enable workload identity on compute platform"
      - step: 3
        action: "Deploy dual-credential: WI first, API key fallback"
      - step: 4
        action: "Reduce API key TTL to 7 days"
      - step: 5
        action: "Remove API key after all workloads confirmed using WI"
    references:
      - mech:aws-irsa
      - mech:gcp-workload-identity
      - mech:azure-managed-identity

  - id: scenario:on-prem-to-cloud
    description: "On-premises agent calling cloud services via X.509 trust anchor"
    source_runtime: on_premises_server
    target_type: cloud_iam
    identity_kind: machine
    steps:
      - step: 1
        mechanism: mech:aws-iam-roles-anywhere
        action: "Present X.509 certificate to AWS IAM Roles Anywhere"
        produces: aws_temporary_credentials
      - step: 2
        action: "Call AWS services with temporary credentials"
    references:
      - mech:aws-iam-roles-anywhere

  - id: scenario:cross-org-a2a
    description: "Cross-organizational A2A call with JWS-signed request"
    source_runtime: any_agent
    target_type: partner_agent
    identity_kind: machine
    steps:
      - step: 1
        action: "Fetch partner AgentCard (max 1h cache TTL)"
        url: "https://partner.example.com/.well-known/agent.json"
      - step: 2
        mechanism: mech:a2a-jws
        action: "Sign request body with JWS (JCS canonicalization)"
        produces: signed_request
      - step: 3
        action: "POST to partner agent endpoint"
        wire_format: |
          Authorization: Bearer <oauth2_bearer>
          Content-Type: application/json
    references:
      - mech:a2a-jws

  - id: scenario:three-hop-attenuation
    description: "Three-hop delegation with scope attenuation at each hop"
    steps:
      - step: 1
        mechanism: mech:oauth2.auth-code-pkce
        action: "User authorizes Agent A (scope: read:write:delete)"
      - step: 2
        mechanism: mech:oauth2.token-exchange
        action: "Agent A exchanges for Agent B token (scope: read:write)"
      - step: 3
        mechanism: mech:oauth2.token-exchange
        action: "Agent B exchanges for Agent C token (scope: read)"
      - note: "STS enforces scope ⊆ at each hop; no escalation possible"
    references:
      - mech:oauth2.token-exchange

  - id: scenario:browser-agent
    description: "Browser automation agent operating under user session"
    note: "No standard for proving AI agent identity in browser context. Web Bot Auth proposal is early-stage. Current mitigation: dedicated service account with minimum scopes."
    references: []

  - id: scenario:three-hop-biscuit
    description: "Three-hop delegation using Biscuits for low-latency offline attenuation"
    steps:
      - step: 1
        action: "Issuer creates Biscuit token with full permissions"
      - step: 2
        action: "Agent A attenuates to read:write (offline, no STS call)"
      - step: 3
        action: "Agent B attenuates to read:specific-resource (offline)"
      - step: 4
        action: "Agent C presents final attenuated Biscuit to resource server"
      - note: "No STS round-trips. Suitable for sub-100ms delegation chains."
    references:
      - mech:capability-tokens

glossary:
  - id: term:holder-bound
    term: "Holder-bound"
    definition: "A token is holder-bound when the recipient must prove possession of a private key to use it (DPoP, mTLS certificate-bound). Contrast: bearer token where possession alone grants authorization."

  - id: term:m2m
    term: "Machine-to-machine (M2M)"
    definition: "Service calling another service without a human user in the loop."

  - id: term:workload-identity
    term: "Workload Identity"
    definition: "An identity assigned to a running compute workload (pod, function, container) by its execution environment, rather than managed credentials."

  - id: term:scope-attenuation
    term: "Scope Attenuation"
    definition: "Progressively narrowing the set of permissions at each delegation hop. A delegated token can never grant more permissions than the delegating token."

  - id: term:sts
    term: "Security Token Service (STS)"
    definition: "A service that validates one credential type and issues a new one, potentially with different scope, audience, or format. Example: AWS STS, GCP STS."

  - id: term:dpop
    term: "DPoP"
    definition: "Demonstration of Proof-of-Possession (RFC 9449). HTTP-layer token binding via ephemeral key pair and per-request proof JWT."

  - id: term:pkce
    term: "PKCE"
    definition: "Proof Key for Code Exchange (RFC 7636). S256 method mandatory. Prevents authorization code interception attacks."

  - id: term:ocap
    term: "Object-Capability (OCap)"
    definition: "Security model where access is controlled by unforgeable tokens representing permissions, rather than identity + ACL lookup. Biscuits and Macaroons implement OCap."

  - id: term:deprovisioning
    term: "De-provisioning"
    definition: "Permanent, complete removal of an agent identity from all systems. Distinct from revocation (credential invalidation while identity persists)."

  - id: term:act-claim
    term: "act claim"
    definition: "JWT claim identifying the actor currently acting on behalf of the subject. Nested act objects represent delegation chains (RFC 8693)."

  - id: term:wif
    term: "Workload Identity Federation (WIF)"
    definition: "Cloud provider feature trusting external OIDC issuers, enabling workloads to exchange OIDC tokens for cloud-native credentials without stored secrets."

decision_tree:
  - id: rule-gha-mcp-machine
    if:
      runtime: github_actions
      target_type: mcp_server
      identity_kind: machine
    then:
      scenario: scenario:gha-to-mcp

  - id: rule-eks-external-api-m2m
    if:
      runtime: eks_pod
      target_type: external_api
      identity_kind: machine
    then:
      primary_mechanism: mech:aws-irsa
      then: mech:oauth2.client-credentials

  - id: rule-user-delegation
    if:
      identity_kind: user_delegated
      target_type: any
    then:
      mechanism: mech:oauth2.token-exchange

  - id: rule-cicd-cloud
    if:
      runtime: github_actions
      target_type: cloud_iam
      identity_kind: machine
    then:
      primary_mechanism: mech:github-actions-oidc
      then: mech:gcp-workload-identity

  - id: rule-deep-delegation-low-latency
    if:
      identity_kind: delegated_chain
      latency_constraint: low
    then:
      mechanism: mech:capability-tokens

  - id: rule-high-assurance
    if:
      security_assurance_required: very_high
    then:
      mechanism: mech:fapi2

  - id: rule-headless-user-consent
    if:
      requires_user: true
      agent_type: headless
    then:
      mechanism: mech:oauth2.device-auth

  - id: rule-async-reauth
    if:
      agent_type: long_running_autonomous
      requires_mid_task_reauth: true
    then:
      mechanism: mech:ciba

  - id: rule-cross-org-agent
    if:
      target_type: partner_agent
      trust_domain: different_org
    then:
      mechanism: mech:a2a-jws

  - id: rule-on-prem-to-cloud
    if:
      runtime: on_premises
      target_type: cloud_iam
    then:
      mechanism: mech:aws-iam-roles-anywhere

anti_patterns:
  - id: threat:alg-none
    name: "AP-1: alg:none Acceptance"
    severity: critical
    description: "JWT library accepts alg:none, stripping signature verification"
    detection: "Audit JWT validation for verify=False or algorithms=None"
    fix: "Explicit algorithm allowlist in every JWT decode call"

  - id: threat:alg-confusion
    name: "AP-2: RS256/HS256 Algorithm Confusion"
    severity: critical
    description: "Attacker uses RSA public key as HMAC secret to forge tokens"
    detection: "Check if same key is used for RS256 and HS256 paths"
    fix: "Never derive algorithm from token header; hard-code expected algorithm"

  - id: threat:pkce-plain
    name: "AP-3: PKCE plain Method"
    severity: high
    description: "code_challenge is observable in URL, defeating PKCE protection"
    detection: "Check for code_challenge_method=plain in auth requests"
    fix: "S256 only; servers must reject plain"

  - id: threat:wildcard-aud
    name: "AP-4: Wildcard aud Validation"
    severity: high
    description: "Prefix or substring match for aud claim enables confused deputy"
    detection: "Check validation code for substring/regex aud matching"
    fix: "Exact string match; aud must be in pre-configured list"

  - id: threat:jku-header
    name: "AP-5: JWKS from jku/x5u"
    severity: critical
    description: "Attacker supplies their own JWKS URL in token header"
    detection: "Check for code fetching JWKS from jwt.get_unverified_header"
    fix: "Always use pre-configured JWKS endpoint; never from token header"

  - id: threat:long-lived-apikey-env
    name: "AP-6: Long-Lived API Keys in Env Vars"
    severity: high
    description: "API key in container env; readable by any process; indefinite compromise on exfiltration"
    detection: "grep for export.*KEY= or API_KEY in Dockerfiles and CI configs"
    fix: "Workload identity; or secrets manager with rotation"

  - id: threat:wildcard-cicd-sub
    name: "AP-7: Wildcard CI/CD sub Conditions"
    severity: high
    description: "Any repo in org can assume cloud role"
    detection: "Check IAM trust policies for StringLike with repo:org/*"
