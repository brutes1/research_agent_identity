    status: stable
    rfc: "AWS IRSA documentation"
    token_type: aws_temporary_credentials
    lifetime: short
    lifetime_typical: "3600s–43200s"
    holder_bound: false
    revocable: short_expiry
    requires_user: false
    attestation_mechanism: k8s_api
